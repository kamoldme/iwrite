<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
    max-width: 800px;
  }
  .logo {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .logo span {
    color: #4ade80;
  }
  .tagline {
    font-size: 28px;
    color: #888;
    line-height: 1.4;
  }
  .tagline strong {
    color: #ef4444;
  }
  .bar {
    width: 80px;
    height: 4px;
    background: #4ade80;
    border-radius: 2px;
    margin: 32px auto;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">iWrite4<span>.me</span></div>
    <div class="bar"></div>
    <div class="tagline">A distraction-free writing tool.<br>If you stop typing, <strong>it deletes your work</strong>.</div>
  </div>
</body>
</html>
